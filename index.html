<!DOCTYPE html>
<html>
    <head>
        <script>
            let socket = new WebSocket("ws://localhost:4096");

            socket.onopen = function(event) {
                // Handle connection open
                console.log("CONNECTED")
            };
            socket.onmessage = function(event) {
                // Handle received message
                console.log("MSG GOT")
            };

            socket.onclose = function(event) {
                // Handle connection close
                console.log("CLOSED")
            };

            function sendMessage(number) {
                var d = new Date();
                console.log("Sending Stuff - " + d.getMilliseconds());
                var buffer = new Uint8Array(1);
                buffer[0] = number;
                socket.send(buffer);
            }
        </script>
    </head>
    <body>
        <button onclick="sendMessage(1)">PRESS ME</button>
        <button onclick="sendMessage(2)">PRESS ME TWOOOoooo</button>
    </body>
</html>
